services:
  postgres:
    build:
      context: ./infra/postgres
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "5432:5432"
    restart: always

  server:
    build:
      context: ./apps/server  
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - db_host=postgres
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    restart: always
  frontend:
    build:
      context: ./apps/client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: always